services:
  postgres:
    image: postgres:16-alpine
    container_name: google-docs-clone-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: docs
      POSTGRES_PASSWORD: docs
      POSTGRES_DB: google_docs_clone
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docs -d google_docs_clone"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
